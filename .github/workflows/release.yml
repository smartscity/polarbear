name: Release Polarbear

on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS Universal DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm --workspace apps/desktop run typecheck

      - name: Build macOS Universal DMG
        run: |
          cd apps/desktop
          npx tauri build --target universal-apple-darwin --bundles dmg

      - name: Show bundle files
        run: |
          echo "DMG files:"
          find . -type f -path "*/bundle/dmg/*.dmg" -print

          echo "macOS app bundles:"
          find . -type d -path "*/bundle/macos/*.app" -print

      - name: Upload DMG to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          DMG_FILE=$(find . -type f -path "*/bundle/dmg/*.dmg" | head -n 1)

          if [ -z "$DMG_FILE" ]; then
            echo "No DMG file found"
            find . -type f -name "*.dmg" -print
            exit 1
          fi

          echo "Uploading $DMG_FILE to release $TAG"

          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --title "Polarbear ${TAG#app-v}" \
              --notes "Polarbear macOS Universal DMG release." \
              --draft

          gh release upload "$TAG" "$DMG_FILE" --clobber
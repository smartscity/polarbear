name: Release Polarbear

on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

jobs:
  build-macos:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm --workspace apps/desktop run typecheck

      - name: Build and upload Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: app-v__VERSION__
          releaseName: "Polarbear v__VERSION__"
          releaseBody: "See the assets below to download Polarbear."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles dmg
name: Release Polarbear

on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS Universal
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm --workspace apps/desktop run typecheck

      - name: Build and upload Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: npm run tauri --
          tagName: app-v__VERSION__
          releaseName: "Polarbear v__VERSION__"
          releaseBody: "Polarbear macOS Universal DMG release."
          releaseDraft: true
          prerelease: false
          retryAttempts: 3
          releaseAssetNamePattern: "Polarbear_[version]_universal[ext]"
          args: --target universal-apple-darwin --bundles dmg
name: Release Polarbear

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm --workspace apps/desktop run typecheck

      - name: Lint
        run: npm --workspace apps/desktop run lint

      - name: Frontend tests
        run: npm --workspace apps/desktop run test

      - name: Rust format
        run: cargo fmt --all -- --check

      - name: Sync Tauri version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          if [ -z "$VERSION" ] || [ "$VERSION" = "$TAG" ]; then
            echo "Invalid tag: $TAG"
            echo "Expected tag format: v0.1.7"
            exit 1
          fi

          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

          export APP_VERSION="$VERSION"

          node <<'NODE'
          const fs = require('fs');

          const version = process.env.APP_VERSION;

          if (!version) {
            console.error('APP_VERSION is empty');
            process.exit(1);
          }

          const jsonFiles = [
            'apps/desktop/src-tauri/tauri.conf.json',
            'apps/desktop/package.json',
            'package.json'
          ];

          for (const file of jsonFiles) {
            if (!fs.existsSync(file)) continue;

            const json = JSON.parse(fs.readFileSync(file, 'utf8'));
            json.version = version;
            fs.writeFileSync(file, JSON.stringify(json, null, 2) + '\n');

            console.log(`Updated ${file} -> ${version}`);
          }
          NODE

      - name: Verify version before build
        run: |
          echo "APP_VERSION=$APP_VERSION"
          echo "RELEASE_TAG=$RELEASE_TAG"

          echo "---- tauri.conf.json ----"
          grep -n '"version"' apps/desktop/src-tauri/tauri.conf.json || true

          echo "---- apps/desktop/package.json ----"
          grep -n '"version"' apps/desktop/package.json || true

          echo "---- root package.json ----"
          grep -n '"version"' package.json || true

      - name: Build macOS DMG
        run: |
          cd apps/desktop
          npx tauri build --target universal-apple-darwin --bundles dmg

      - name: Locate and rename DMG
        run: |
          DMG_FILE=$(find . -type f -path "*/bundle/dmg/*.dmg" | head -n 1)

          if [ -z "$DMG_FILE" ]; then
            echo "No DMG file found"
            find . -type f -name "*.dmg" -print
            exit 1
          fi

          echo "Original DMG: $DMG_FILE"

          RENAMED_DMG="Polarbear_${APP_VERSION}.dmg"
          cp "$DMG_FILE" "$RENAMED_DMG"

          echo "DMG_FILE=$RENAMED_DMG" >> "$GITHUB_ENV"

          echo "Renamed DMG:"
          ls -la "$RENAMED_DMG"

      - name: Show bundle files
        run: |
          echo "DMG files:"
          find . -type f -name "*.dmg" -print

          echo "macOS app bundles:"
          find . -type d -path "*/bundle/macos/*.app" -print

      - name: Upload DMG to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${RELEASE_TAG}"

          echo "Uploading $DMG_FILE to release $TAG"

          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --title "Polarbear ${APP_VERSION}" \
              --notes "Polarbear macOS DMG release." \
              --draft

          gh release upload "$TAG" "$DMG_FILE" --clobber
